[package]
name = "v0"
version = "0.2.0"
edition = "2024"

[dependencies]
# Web 框架
axum       = "0.7"
tokio      = { version = "1", features = ["full"] }
tower-http = { version = "0.5", features = ["trace"] }

# 数据库 — 替换 sqlite → postgres
# ✅ 变更: features 从 ["sqlite", "runtime-tokio-rustls"]
#          改为    ["postgres", "runtime-tokio-rustls"]
sqlx = { version = "0.7", features = [
    "postgres",
    "runtime-tokio-rustls",
] }

# UUID 用于生成唯一 License Key (HKEY-XXXX-XXXX-XXXX 格式)
uuid = { version = "1", features = ["v4"] }

# 序列化
serde      = { version = "1", features = ["derive"] }
serde_json = "1"

# 日志
tracing            = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
sha2 = "0.11.0"

hex = "0.4"

[profile.release]
opt-level = 3
lto = true
